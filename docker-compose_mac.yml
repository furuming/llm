services:
  web:
    image: caddy:latest
    ports:
      - 8080:8080
    volumes:
      - ./.docker/caddy/Caddyfile:/etc/caddy/Caddyfile
#      - ./.docker/caddy/data:/data
#      - ./.docker/caddy/config:/config
  backend:
    build:
      context: ../llm_backend
    ports:
      - 19000:9000
    tty: true
    volumes:
      - ./voice_transcription_backend:/app:rw

  frontend:
    build:
      context: ../llm_frontend
    tty: true
    ports:
      - 13000:3000
    volumes:
      - ./voice_transcription_frontend:/var/www/frontend:rw
  # core:
  #   build:
  #     context: ./voice_transcription_core
  #   tty: true
  #   volumes:
  #     - ./voice_transcription_core:/app:rw
  #     - ./data:/data
  # rag:
  #   build:
  #     context: ../llm_rag
  #     dockerfile: dockerfile
  #   volumes:
  #     - ./data:/work/data
  #   tty: true
  db:
    image: mysql:latest
    ports:
      - 13306:3306
    environment:
      - MYSQL_ROOT_PASSWORD=password
      - MYSQL_DATABASE=myapp
      - MYSQL_USER=user
      - MYSQL_PASSWORD=password
    volumes:
      - ./.docker/mysql/data:/var/lib/mysql
  vdb:
    image: qdrant/qdrant:latest
    ports:
      - 6333:6333
      - 6334:6334
    volumes:
      - ./.docker/qdrant/storage:/qdrant/storage
      - ./.docker/qdrant/snapshots:/qdrant/snapshots
      - ./.docker/qdrant/config/production.yaml:/qdrant/config/production.yaml:ro

  vdb-init:
    image: curlimages/curl:8.10.1
    depends_on:
      - vdb
    environment:
      - QDRANT_URL=http://vdb:6333
    volumes:
      - ./.docker/qdrant/collections:/collections:ro
      - ./.docker/qdrant/scripts:/scripts:ro
    entrypoint: ["/bin/sh", "/scripts/apply-collections.sh"]
    restart: "no"

  
